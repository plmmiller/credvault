services:
  - type: web
    name: credvault
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /.well-known/did.json
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_DIR
        value: /tmp/credvault-data
